name: Release Obsidian plugin

on:
  push:
    tags:
      - "*"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3

      - name: Use Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "18.x"

      - name: Install dependencies
        run: npm install

      - name: Build plugin
        run: npm run build

      - name: Create release assets
        run: |
          # Create a release directory
          mkdir -p release
          
          # Copy main files
          cp main.js manifest.json styles.css release/
          
          # Create zip file for easy distribution
          cd release
          zip -r ../obsidian-rss-dashboard.zip .
          cd ..

      - name: Create release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${GITHUB_REF#refs/tags/}"

          release_notes="Release $tag"
          release_flags=(--title="$tag" --notes="$release_notes" --draft)

          # Alpha tags are prereleases and should be published (not drafts) so BRAT can see them.
          if [[ "$tag" =~ ^[0-9]+\.[0-9]+\.[0-9]+-alpha\.[0-9]+$ ]]; then
            release_notes="Alpha release $tag"
            release_flags=(--title="$tag" --notes="$release_notes" --prerelease)
          fi

          # Beta tags must be formatted without a leading "v", e.g. 2.1.0-beta.1
          if [[ "$tag" =~ ^[0-9]+\.[0-9]+\.[0-9]+-beta\.[0-9]+$ ]]; then
            release_notes="Beta release $tag"
            release_flags=(--title="$tag" --notes="$release_notes" --prerelease)
          fi

          # Create release with all assets
          gh release create "$tag" \
            "${release_flags[@]}" \
            main.js \
            manifest.json \
            styles.css \
            obsidian-rss-dashboard.zip
